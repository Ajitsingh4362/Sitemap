<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDP Finder — Client Edition</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050507;--s1:#0b0c10;--s2:#12131a;--b:#1e1f2b;--b2:#2a2b3d;
  --g:#00e5a0;--g2:#00b8ff;--acc:#ff4d6d;--acc2:#ffd166;
  --t:#e8eaf6;--m:#6b7099;--dim:#3d4063;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}

.hdr{padding:22px 32px 18px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:rgba(5,5,7,.95);backdrop-filter:blur(12px)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--g)}
.logo span{color:var(--m)}
.hdr-right{display:flex;align-items:center;gap:12px}
.hdr-stat{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--m)}
.hdr-stat b{color:var(--g2)}

.main{max-width:1400px;margin:0 auto;padding:28px 24px}

/* TOP CONTROLS */
.ctrl-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.btn{padding:11px 22px;border:none;border-radius:6px;font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.btn-primary{background:var(--g);color:#000}
.btn-primary:hover:not(:disabled){background:#00ffb3;transform:translateY(-1px)}
.btn-primary:disabled{background:var(--s2);color:var(--m);cursor:not-allowed;transform:none}
.btn-outline{background:transparent;border:1px solid var(--b2);color:var(--m)}
.btn-outline:hover{border-color:var(--g);color:var(--g)}
.btn-outline:disabled{opacity:.3;cursor:not-allowed}

.status-chips{display:flex;gap:8px;margin-left:auto}
.chip{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:5px 10px;border-radius:4px;border:1px solid var(--b)}
.chip b{font-size:13px}

/* TABLE */
.tbl-wrap{background:var(--s1);border:1px solid var(--b);border-radius:10px;overflow:hidden}
.tbl-head-bar{padding:14px 18px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.tbl-title{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:1.5px}

table{width:100%;border-collapse:collapse}
thead th{
  font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:1px;color:var(--m);padding:11px 14px;text-align:left;
  border-bottom:1px solid var(--b);background:var(--s1);white-space:nowrap
}
tbody tr{transition:background .12s;border-bottom:1px solid rgba(30,31,43,.6)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:rgba(42,43,61,.5)}
td{padding:0;vertical-align:top}

/* CELLS */
.cell{padding:12px 14px;height:100%}

.cell-domain{font-weight:600;font-size:13px;white-space:nowrap}
.cell-domain .d-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--m);margin-top:3px}

/* STATUS */
.st{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:3px 8px;border-radius:3px;display:inline-block;white-space:nowrap}
.st-pending{background:rgba(107,112,153,.12);color:var(--m)}
.st-running{background:rgba(0,184,255,.12);color:var(--g2)}
.st-done{background:rgba(0,229,160,.1);color:var(--g)}
.st-error{background:rgba(255,77,109,.1);color:var(--acc)}

/* URL CELL */
.url-cell{font-family:'IBM Plex Mono',monospace;font-size:10px;line-height:1.5}
.url-cell a{color:var(--g2);text-decoration:none;word-break:break-all;display:block}
.url-cell a:hover{color:var(--g);text-decoration:underline}
.url-cell .none{color:var(--dim);font-style:italic;font-size:9px}
.url-cell .finding{color:var(--acc2);animation:blink .8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* LOG CELL */
.log-cell{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--m);line-height:1.7;max-width:180px}
.log-cell .log-s{color:var(--g)}
.log-cell .log-e{color:var(--acc)}
.log-cell .log-w{color:var(--acc2)}

/* PROGRESS DOT */
.prog-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--g2);margin-right:5px;animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

.sp{display:inline-block;width:9px;height:9px;border:2px solid rgba(0,0,0,.15);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}

/* TOOLTIP */
[title]{cursor:help}

/* COL WIDTHS */
.col-no{width:36px}
.col-domain{width:180px}
.col-sm{width:22%}
.col-pdp{width:20%}
.col-log{width:160px}
.col-st{width:80px}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">PDP<span>·</span>FINDER <span style="font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--m)">CLIENT EDITION</span></div>
  <div class="hdr-right">
    <div class="hdr-stat">DONE: <b id="hdr-done">0</b> / <b id="hdr-total">0</b> &nbsp;|&nbsp; PDPs: <b id="hdr-pdps">0</b></div>
  </div>
</div>

<div class="main">
  <div class="ctrl-bar">
    <button class="btn btn-primary" id="btn-run" onclick="runAll()">⚡ RUN ALL</button>
    <button class="btn btn-outline" id="btn-dl" onclick="dlExcel()" disabled>⬇ DOWNLOAD EXCEL</button>
    <div class="status-chips">
      <div class="chip"><b id="chip-done" style="color:var(--g)">0</b> done</div>
      <div class="chip"><b id="chip-run" style="color:var(--g2)">0</b> running</div>
      <div class="chip"><b id="chip-err" style="color:var(--acc)">0</b> failed</div>
    </div>
  </div>

  <div class="tbl-wrap">
    <div class="tbl-head-bar">
      <span class="tbl-title">All Domains — 4 Fields Per Domain</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim)">sitemap-items · sitemap-categories · pdp1 · pdp2</span>
    </div>
    <div style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th class="col-no">#</th>
          <th class="col-domain">Domain</th>
          <th class="col-sm">Sitemap XML — Items</th>
          <th class="col-sm">Sitemap XML — Categories</th>
          <th class="col-pdp">PDP URL 1</th>
          <th class="col-pdp">PDP URL 2</th>
          <th class="col-log">Log</th>
          <th class="col-st">Status</th>
        </tr>
      </thead>
      <tbody id="tbl-body"></tbody>
    </table>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>

/* ═══════════════════════════════════
   CLIENT DATA
═══════════════════════════════════ */
const CLIENT = [
  { domain:'www.freepeople.com',    smItems:'https://www.freepeople.com/fpmovement/products_sitemap.xml', smCats:'',  pdp1:'', pdp2:'' },
  { domain:'www.shopterrain.com',   smItems:'https://www.shopterrain.com/products_sitemap.xml',           smCats:'https://www.shopterrain.com/categories_sitemap.xml', pdp1:'https://www.shopterrain.com/shop/rainy-day-duck-felt-critter?color=072', pdp2:'https://www.shopterrain.com/shop/solar-pebble-light?color=010' },
  { domain:'www.anthropologie.com', smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.laroche-posay.us',  smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.lg.com',            smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.fragrancenet.com',  smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.paulaschoice.com',  smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.converse.com',      smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'thefivetenshoes.com',   smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'cooklist.com',          smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'rtfkt.com',             smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.dollargeneral.com', smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.clinique.com',      smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.bjs.com',           smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.ae.com',            smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.kiehls.com',        smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.theouai.com',       smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'electronics.sony.com',  smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'oldnavy.gap.com',       smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.supergoop.com',     smItems:'https://supergoop.com/sitemap_products_1.xml?from=112965845008&to=7497332162658', smCats:'https://supergoop.com/sitemap_collections_1.xml?from=5691441168&to=291263873122', pdp1:'https://supergoop.com/products/city-sunscreen-serum?variant=731871641616', pdp2:'https://supergoop.com/products/play-lip-shield-spf-30' },
  { domain:'www.sallybeauty.com',   smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.naturemade.com',    smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.surlatable.com',    smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.garmin.com',        smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.dickblick.com',     smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.sears.com',         smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'shop.asus.com',         smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.oxo.com',           smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'naturium.com',          smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'shop.gnc.com',          smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.oreillyauto.com',   smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.dior.com',          smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.backmarket.com',    smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.asics.com',         smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.carparts.com',      smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.tatcha.com',        smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.dermalogica.com',   smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.famousfootwear.com',smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.underarmour.com',   smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.yesstyle.com',      smItems:'', smCats:'', pdp1:'', pdp2:'' },
  { domain:'www.flooranddecor.com', smItems:'', smCats:'', pdp1:'', pdp2:'' },
];

/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
let ROWS = CLIENT.map((c, i) => ({
  id: i,
  domain: c.domain,
  smItems: c.smItems,   // known sitemap items
  smCats:  c.smCats,    // known sitemap cats
  pdp1:    c.pdp1,      // known pdp1
  pdp2:    c.pdp2,      // known pdp2
  // discovered:
  foundSmItems: c.smItems || '',
  foundSmCats:  c.smCats  || '',
  foundPdp1:    c.pdp1    || '',
  foundPdp2:    c.pdp2    || '',
  status: 'pending',
  log: '',
  logType: 'i',
}));

let IS_RUNNING = false;
const DP = new DOMParser();

/* ═══════════════════════════════════
   FETCH — race 4 proxies
═══════════════════════════════════ */
const PX = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

function get(url, ms=10000){
  return new Promise(res => {
    let done=false, fails=0;
    const fin = v => { if(!done){done=true; res(v);} };
    setTimeout(() => fin(null), ms);
    PX.forEach(p => {
      fetch(p(url))
        .then(r => r.ok ? r.text() : Promise.reject())
        .then(t => { if(t && t.length > 60) fin(t); else throw 0; })
        .catch(() => { if(++fails === PX.length) fin(null); });
    });
  });
}

function ab(href, base){
  if(!href) return null;
  href = href.trim();
  try {
    if(href.startsWith('http')) return href;
    if(href.startsWith('//')) return 'https:' + href;
    return new URL(href, base).href;
  } catch { return null; }
}

/* ═══════════════════════════════════
   PDP DETECTION
═══════════════════════════════════ */
const BAD = new Set(['cart','checkout','login','signin','sign-in','register','signup','account','my-account','profile','orders','order','wishlist','compare','search','blog','blogs','news','post','posts','article','articles','about','contact','faq','help','support','policy','policies','privacy','terms','sitemap','stores','store-locator','store-finder','track','tracking','gift-card','gift-cards','loyalty','rewards','refer','affiliate','press','careers','jobs','investors','sustainability','accessibility','pages','sections','collection','collections','category','categories','department','departments','brand','brands','ext','api','cdn-cgi','static','assets','media','images','fonts','tag','tags','event','events','engage','user','points','referral','redeem']);
const BAD_EXT = /\.(jpg|jpeg|png|gif|svg|webp|pdf|zip|css|js|xml|txt|ico|woff|woff2|mp4|mp3|json)(\?|#|$)/i;
const PDP_RULES = [
  p => /\/(products?)\//i.test(p.pathname),
  p => /\/items?\//i.test(p.pathname),
  p => /\/dp\/[A-Z0-9]{5,}/i.test(p.pathname),
  p => /\/pd\/[^\/\s?#]{3,}/i.test(p.pathname),
  p => /\/detail\/[^\/\s?#]{3,}/i.test(p.pathname),
  p => /\/sku\/[^\/\s?#]{3,}/i.test(p.pathname),
  p => /\/collections\/[^\/]+\/products\/[^\/\s?#]{3,}/i.test(p.pathname),
  p => /\-(\d{6,})(\.html?)?(\?|#|$)/.test(p.pathname) || /\/(\d{7,})(\.html?)?(\?|#|$)/.test(p.pathname),
  p => /[?&](productId|product_id|pid|itemId|skuId|modelNo|partNumber)=[^&\s#]{2,}/i.test(p.search),
  p => { const s=p.pathname.split('/').filter(Boolean); return s.length>=2 && /^[a-z0-9][a-z0-9\-_]{6,}\.html?$/i.test(s[s.length-1]); },
  p => /\/store\/product\//i.test(p.pathname),
  p => { const m=p.pathname.match(/\/p\/([^\/\s?#]+)/i); return !!(m&&m[1].length>=4); },
  p => { const s=p.pathname.split('/').filter(Boolean); return s[0]==='shop'&&s.length>=2&&(s[1]||'').length>=5; },
  p => { const last=(p.pathname.split('/').filter(Boolean).pop()||''); return last.length>=10 && /\-v\-[a-z0-9]/i.test(last); },
];

function isPDP(url, domainBare){
  if(!url) return false;
  let p; try{ p=new URL(url); }catch{ return false; }
  if(domainBare && !p.hostname.toLowerCase().includes(domainBare)) return false;
  if(BAD_EXT.test(url)) return false;
  const segs = p.pathname.split('/').filter(Boolean);
  if(!segs.length) return false;
  if(segs.some(s => BAD.has(s.toLowerCase()))) return false;
  return PDP_RULES.some(fn => { try{ return fn(p); }catch{ return false; } });
}

/* ═══════════════════════════════════
   SITEMAP HELPERS
═══════════════════════════════════ */
function locsFromXML(txt){
  return [...txt.matchAll(/<loc>\s*(.*?)\s*<\/loc>/gis)].map(m=>m[1].trim()).filter(l=>l.startsWith('http'));
}

function smKeyword(url){
  const u = url.toLowerCase();
  if(/product|item|goods|catalog/i.test(u)) return 'items';
  if(/categor|collection|department/i.test(u)) return 'cats';
  return 'other';
}

/* ═══════════════════════════════════
   PROCESS ONE DOMAIN
═══════════════════════════════════ */
async function processDomain(row){
  row.status = 'running';
  setLog(row, 'Starting…', 'i');
  updateRow(row);

  const bare = row.domain.replace(/^www\./, '').split('/')[0];
  const bases = ['https://www.'+bare, 'https://'+bare];

  // If we already have all 4 from client data, skip
  if(row.foundSmItems && row.foundSmCats && row.foundPdp1 && row.foundPdp2){
    setLog(row, '✓ All from client data', 's');
    row.status = 'done';
    updateRow(row);
    return;
  }

  /* ── 1. robots.txt → find sitemap URLs ── */
  let robotsSitemaps = [];
  const rr = await Promise.allSettled(bases.map(b => get(b+'/robots.txt', 6000)));
  for(const r of rr){
    if(r.status!=='fulfilled'||!r.value) continue;
    for(const m of r.value.matchAll(/Sitemap:\s*(https?:\/\/[^\s]+)/gi))
      robotsSitemaps.push(m[1].trim());
  }
  robotsSitemaps = [...new Set(robotsSitemaps)];

  /* ── 2. Build sitemap candidate list ── */
  const SM_PATHS_ITEMS = [
    '/sitemap_products_1.xml','/sitemap-products.xml','/sitemap_products.xml',
    '/product-sitemap.xml','/sitemap/products.xml','/sitemap-product.xml',
    '/sitemap_1.xml','/sitemap-1.xml',
  ];
  const SM_PATHS_CATS = [
    '/sitemap_collections_1.xml','/sitemap-collections.xml','/sitemap_collections.xml',
    '/sitemap-categories.xml','/sitemap_categories.xml','/category-sitemap.xml',
  ];
  const SM_PATHS_INDEX = ['/sitemap.xml','/sitemap_index.xml','/sitemaps/sitemap.xml'];

  // Pre-populate from client known
  let smItemsURL  = row.foundSmItems || '';
  let smCatsURL   = row.foundSmCats  || '';

  /* ── 3. Fetch sitemap index if needed ── */
  if(!smItemsURL || !smCatsURL){
    const indexCands = [...new Set([...robotsSitemaps, ...bases.flatMap(b => SM_PATHS_INDEX.map(p => b+p))])];
    const ir = await Promise.allSettled(indexCands.slice(0,8).map(u=>get(u,7000)));
    let subSitemaps = [...robotsSitemaps];

    for(let i=0;i<ir.length;i++){
      if(ir[i].status!=='fulfilled'||!ir[i].value) continue;
      const txt = ir[i].value;
      if(/<sitemapindex/i.test(txt)){
        locsFromXML(txt).forEach(l => subSitemaps.push(l));
      } else if(!smItemsURL || !smCatsURL){
        // It's a plain sitemap — try to classify it
        const kw = smKeyword(indexCands[i]);
        const pdps = locsFromXML(txt).filter(u=>isPDP(u,bare));
        if(kw==='items' && !smItemsURL && pdps.length) smItemsURL = indexCands[i];
        if(kw==='cats'  && !smCatsURL  && pdps.length) smCatsURL  = indexCands[i];
      }
    }

    subSitemaps = [...new Set(subSitemaps)];

    /* ── 4. Classify sub-sitemaps ── */
    if((!smItemsURL || !smCatsURL) && subSitemaps.length){
      // Fetch all sub-sitemaps in parallel
      const sr = await Promise.allSettled(subSitemaps.slice(0,20).map(u=>get(u,9000)));
      for(let i=0;i<sr.length;i++){
        if(sr[i].status!=='fulfilled'||!sr[i].value) continue;
        const txt = sr[i].value;
        const url = subSitemaps[i];
        const kw  = smKeyword(url);
        const locs = locsFromXML(txt);
        const pdpCount = locs.filter(u=>isPDP(u,bare)).length;

        if(!smItemsURL && pdpCount > 0 && (kw==='items' || kw==='other'))
          smItemsURL = url;
        if(!smCatsURL && pdpCount > 0 && kw==='cats')
          smCatsURL = url;
        if(smItemsURL && smCatsURL) break;
      }
    }

    /* ── 5. Try standard paths if still missing ── */
    if(!smItemsURL){
      const cands = bases.flatMap(b => SM_PATHS_ITEMS.map(p=>b+p));
      const cr = await Promise.allSettled(cands.map(u=>get(u,6000)));
      for(let i=0;i<cr.length;i++){
        if(cr[i].status!=='fulfilled'||!cr[i].value) continue;
        const locs = locsFromXML(cr[i].value);
        if(locs.filter(u=>isPDP(u,bare)).length > 0){ smItemsURL=cands[i]; break; }
      }
    }
    if(!smCatsURL){
      const cands = bases.flatMap(b => SM_PATHS_CATS.map(p=>b+p));
      const cr = await Promise.allSettled(cands.map(u=>get(u,6000)));
      for(let i=0;i<cr.length;i++){
        if(cr[i].status!=='fulfilled'||!cr[i].value) continue;
        const locs = locsFromXML(cr[i].value);
        if(locs.length > 0){ smCatsURL=cands[i]; break; }
      }
    }
  }

  row.foundSmItems = smItemsURL;
  row.foundSmCats  = smCatsURL;
  setLog(row, `SM-items: ${smItemsURL?'✓':'—'} | SM-cats: ${smCatsURL?'✓':'—'}`, smItemsURL||smCatsURL?'s':'w');
  updateRow(row);

  /* ── 6. Find 2 PDP URLs ── */
  let pdp1 = row.foundPdp1 || '';
  let pdp2 = row.foundPdp2 || '';

  if(!pdp1 || !pdp2){
    // Try items sitemap first
    const smToTry = [smItemsURL, smCatsURL].filter(Boolean);
    for(const smURL of smToTry){
      if(pdp1 && pdp2) break;
      const txt = await get(smURL, 9000);
      if(!txt) continue;
      const locs = locsFromXML(txt).filter(u=>isPDP(u,bare));
      if(!pdp1 && locs[0]) pdp1 = locs[0];
      if(!pdp2 && locs[1]) pdp2 = locs[1];
    }

    // If still not found, crawl homepage
    if(!pdp1 || !pdp2){
      let homeHTML = null, homeBase = bases[0];
      for(const b of bases){
        homeHTML = await get(b, 9000);
        if(homeHTML){ homeBase=b; break; }
      }
      if(homeHTML){
        const doc = DP.parseFromString(homeHTML, 'text/html');
        const found = [];
        doc.querySelectorAll('a[href]').forEach(a => {
          const u = ab(a.getAttribute('href'), homeBase);
          if(u && isPDP(u, bare) && found.length < 5) found.push(u);
        });
        // also check LD+JSON
        doc.querySelectorAll('script[type="application/ld+json"]').forEach(el => {
          try{
            const data = JSON.parse(el.textContent);
            const digForPDP = d => {
              if(!d) return;
              if(Array.isArray(d)){ d.forEach(digForPDP); return; }
              if(d['@type']==='Product' && d.url){ const u=ab(d.url,homeBase); if(u&&isPDP(u,bare)) found.push(u); }
              if(d['@graph']) digForPDP(d['@graph']);
            };
            digForPDP(data);
          }catch{}
        });
        const unique = [...new Set(found)];
        if(!pdp1 && unique[0]) pdp1 = unique[0];
        if(!pdp2 && unique[1]) pdp2 = unique[1];

        // Crawl one more category page
        if(!pdp1 || !pdp2){
          const catLinks = [];
          doc.querySelectorAll('a[href]').forEach(a => {
            const u = ab(a.getAttribute('href'), homeBase);
            if(!u||!u.includes(bare)) return;
            try{
              const segs = new URL(u).pathname.split('/').filter(Boolean);
              if(segs.length===1 && segs[0].length>2 && !BAD.has(segs[0])) catLinks.push(u);
            }catch{}
          });
          const catHTML = await get(catLinks[0], 8000);
          if(catHTML){
            const catDoc = DP.parseFromString(catHTML, 'text/html');
            const catPDPs = [];
            catDoc.querySelectorAll('a[href]').forEach(a => {
              const u = ab(a.getAttribute('href'), homeBase);
              if(u && isPDP(u, bare)) catPDPs.push(u);
            });
            if(!pdp1 && catPDPs[0]) pdp1 = catPDPs[0];
            if(!pdp2 && catPDPs[1]) pdp2 = catPDPs[1];
          }
        }
      }
    }
  }

  row.foundPdp1 = pdp1;
  row.foundPdp2 = pdp2;

  const allFound = (row.foundSmItems?1:0)+(row.foundSmCats?1:0)+(pdp1?1:0)+(pdp2?1:0);
  if(allFound===0){
    setLog(row, '✗ Nothing found — site may block proxies', 'e');
    row.status = 'error';
  } else if(allFound<4){
    setLog(row, `⚠ ${allFound}/4 fields found`, 'w');
    row.status = 'done';
  } else {
    setLog(row, '✓ All 4 fields found', 's');
    row.status = 'done';
  }

  updateRow(row);
  updateChips();
  updateHeader();
}

function setLog(row, msg, type){
  row.log = msg;
  row.logType = type;
}

/* ═══════════════════════════════════
   RUN ALL
═══════════════════════════════════ */
async function runAll(){
  if(IS_RUNNING) return;
  IS_RUNNING = true;
  const btn = document.getElementById('btn-run');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>RUNNING…';

  // Reset all pending rows
  ROWS.forEach(r => {
    if(r.status !== 'done') {
      r.foundSmItems = r.smItems || '';
      r.foundSmCats  = r.smCats  || '';
      r.foundPdp1    = r.pdp1    || '';
      r.foundPdp2    = r.pdp2    || '';
      r.status = 'pending';
      r.log = '';
      updateRow(r);
    }
  });

  const queue = ROWS.filter(r => r.status === 'pending');
  let i = 0;
  const CONCURRENCY = 3;

  async function worker(){
    while(i < queue.length){
      const row = queue[i++];
      await processDomain(row);
    }
  }

  await Promise.all(Array.from({length: Math.min(CONCURRENCY, queue.length)}, worker));

  IS_RUNNING = false;
  btn.disabled = false;
  btn.textContent = '⚡ RE-RUN ALL';
  document.getElementById('btn-dl').disabled = false;
  updateChips();
  updateHeader();
}

/* ═══════════════════════════════════
   RENDER TABLE
═══════════════════════════════════ */
function renderTable(){
  const tbody = document.getElementById('tbl-body');
  tbody.innerHTML = '';
  ROWS.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.id = 'row-' + r.id;
    tr.innerHTML = rowHTML(r, i);
    tbody.appendChild(tr);
  });
}

function rowHTML(r, i){
  const idx = i !== undefined ? i : ROWS.indexOf(r);
  const statusLabel = {pending:'PENDING',running:'RUNNING',done:'DONE',error:'FAILED'}[r.status]||r.status.toUpperCase();
  const statusCls   = {pending:'st-pending',running:'st-running',done:'st-done',error:'st-error'}[r.status]||'st-pending';

  const urlCell = (url, label) => {
    if(r.status === 'running' && !url) return `<div class="url-cell"><span class="finding">finding…</span></div>`;
    if(!url) return `<div class="url-cell"><span class="none">—</span></div>`;
    return `<div class="url-cell"><a href="${url}" target="_blank" rel="noopener" title="${url}">${url.length>55?url.slice(0,55)+'…':url}</a></div>`;
  };

  const logCls = {i:'',s:'log-s',w:'log-w',e:'log-e'}[r.logType]||'';

  return `
    <td><div class="cell" style="color:var(--m);font-family:'IBM Plex Mono',monospace;font-size:11px">${String(idx+1).padStart(2,'0')}</div></td>
    <td><div class="cell cell-domain">
      ${r.domain}
      <div class="d-sub">${r.status==='running'?'<span class="prog-dot"></span>processing…':''}</div>
    </div></td>
    <td><div class="cell">${urlCell(r.foundSmItems,'SM-Items')}</div></td>
    <td><div class="cell">${urlCell(r.foundSmCats,'SM-Cats')}</div></td>
    <td><div class="cell">${urlCell(r.foundPdp1,'PDP1')}</div></td>
    <td><div class="cell">${urlCell(r.foundPdp2,'PDP2')}</div></td>
    <td><div class="cell log-cell"><span class="${logCls}">${r.log||''}</span></div></td>
    <td><div class="cell"><span class="st ${statusCls}">${statusLabel}</span></div></td>
  `;
}

function updateRow(r){
  const tr = document.getElementById('row-' + r.id);
  if(!tr) return;
  tr.innerHTML = rowHTML(r);
  updateChips();
}

function updateChips(){
  document.getElementById('chip-done').textContent = ROWS.filter(r=>r.status==='done').length;
  document.getElementById('chip-run').textContent  = ROWS.filter(r=>r.status==='running').length;
  document.getElementById('chip-err').textContent  = ROWS.filter(r=>r.status==='error').length;
}

function updateHeader(){
  const done = ROWS.filter(r=>r.status==='done'||r.status==='error').length;
  const pdps = ROWS.reduce((a,r)=>a+(r.foundPdp1?1:0)+(r.foundPdp2?1:0),0);
  document.getElementById('hdr-done').textContent  = done;
  document.getElementById('hdr-total').textContent = ROWS.length;
  document.getElementById('hdr-pdps').textContent  = pdps;
}

/* ═══════════════════════════════════
   EXCEL DOWNLOAD
═══════════════════════════════════ */
function dlExcel(){
  const wb = XLSX.utils.book_new();
  const data = ROWS.map((r,i) => ({
    '#': i+1,
    'Domain': r.domain,
    'SiteMap XML URL - Items':      r.foundSmItems || '',
    'SiteMap XML URL - Categories': r.foundSmCats  || '',
    'PDP URL1': r.foundPdp1 || '',
    'PDP URL2': r.foundPdp2 || '',
    'Status':   r.status,
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{wch:4},{wch:28},{wch:80},{wch:80},{wch:90},{wch:90},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws, 'PDP Data');
  XLSX.writeFile(wb, `client_pdp_data_${new Date().toISOString().slice(0,10)}.xlsx`);
}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
renderTable();
updateHeader();
updateChips();
</script>
